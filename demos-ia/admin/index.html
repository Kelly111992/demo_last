<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClaveAI · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --bg2: #0e0e11;
      --sidebar: #070709;
      --surface: rgba(255,255,255,0.025);
      --surface2: rgba(255,255,255,0.045);
      --surface-hover: rgba(255,255,255,0.06);
      --surface-active: rgba(215,255,62,0.08);
      --text: #ecebe6;
      --text-dim: #8a8a91;
      --muted: #56565c;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.16);
      --accent: #d7ff3e;
      --accent-dim: rgba(215,255,62,0.15);
      --live: #5dfc9b;
      --live-dim: rgba(93,252,155,0.14);
      --alert: #ff6b6b;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      height: 100vh;
      overflow: hidden;
      background-image:
        radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        radial-gradient(rgba(255,255,255,0.008) 1px, transparent 1px);
      background-size: 4px 4px, 7px 7px;
      background-position: 0 0, 2px 2px;
    }

    a { color: inherit; }
    button { font-family: inherit; }

    /* ════════════════════════════════════════════════════════════
       APP SHELL
       ════════════════════════════════════════════════════════════ */
    .app {
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: 58px 1fr;
      height: 100vh;
    }

    /* HEADER ───────────────────────────────────────────────────── */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 30%, var(--accent) 70%, transparent);
      opacity: 0.12;
    }

    .brand {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.02em;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .brand-logo { color: var(--text); }
    .brand-logo em { color: var(--accent); font-style: normal; font-weight: 600; font-family: var(--font-body); font-size: 17px; letter-spacing: -0.04em; vertical-align: 0.04em; }
    .brand-context {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
      padding-left: 14px;
      border-left: 1px solid var(--border);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--live);
      text-transform: uppercase;
    }
    .live-indicator .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--live);
      box-shadow: 0 0 0 0 var(--live-dim);
      animation: pulseDot 1.6s infinite;
    }
    @keyframes pulseDot {
      0%   { opacity: 1; box-shadow: 0 0 0 0 var(--live-dim); }
      70%  { opacity: 0.5; box-shadow: 0 0 0 6px transparent; }
      100% { opacity: 1; box-shadow: 0 0 0 0 transparent; }
    }

    .user-email {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text-dim);
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .logout-btn:hover { color: var(--bg); background: var(--accent); border-color: var(--accent); }

    /* SIDEBAR ──────────────────────────────────────────────────── */
    aside {
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 22px 0 30px;
    }

    .sidebar-section { padding: 0 22px 22px; }

    .sidebar-label {
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 5px 11px;
      border-radius: 14px;
      font-size: 11.5px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.01em;
    }
    .chip:hover { color: var(--text); border-color: var(--border-strong); }
    .chip.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 500;
    }

    .sidebar-divider {
      border-top: 1px dashed var(--border);
      margin: 0 22px 20px;
      position: relative;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .section-title.live { color: var(--live); }
    .section-count {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* SESSION CARD ─────────────────────────────────────────────── */
    .session-list { display: flex; flex-direction: column; }

    .session-card {
      padding: 13px 22px 14px;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }
    .session-card:hover { background: var(--surface-hover); }
    .session-card.selected {
      background: var(--surface-active);
      border-left-color: var(--accent);
    }

    .session-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .session-demo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .session-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .session-time.fresh { color: var(--live); }

    .session-preview {
      font-size: 13px;
      color: var(--text);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .unread-dot {
      position: absolute;
      right: 18px;
      top: 16px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulseDot 1.2s infinite;
    }

    .sidebar-empty {
      padding: 32px 22px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      font-style: italic;
      text-align: center;
      font-family: var(--font-display);
    }

    /* MAIN ─────────────────────────────────────────────────────── */
    main {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }

    /* EMPTY STATE ───────────────────────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      text-align: center;
    }
    .empty-state .asterisk {
      font-family: var(--font-display);
      color: var(--accent);
      font-size: 42px;
      line-height: 1;
      margin-bottom: 24px;
      animation: spin 12s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state .big {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 42px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    .empty-state .small {
      font-size: 13.5px;
      max-width: 420px;
      line-height: 1.6;
      color: var(--text-dim);
    }

    /* SESSION HEADER ───────────────────────────────────────────── */
    .session-header {
      padding: 20px 32px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .sh-left {}

    .sh-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -0.015em;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .sh-title .emoji { font-style: normal; margin-right: 6px; }

    .sh-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .sh-meta .status {
      padding: 3px 9px;
      font-size: 9.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .sh-meta .status.active { background: var(--live-dim); color: var(--live); }
    .sh-meta .status.historic { background: var(--surface); color: var(--text-dim); }

    /* MAIN SPLIT ───────────────────────────────────────────────── */
    .main-content {
      flex: 1;
      display: grid;
      grid-template-columns: 1.45fr 1fr;
      overflow: hidden;
      min-height: 0;
    }

    .chat-view {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      gap: 10px;
      animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .msg.user .msg-avatar {
      background: var(--accent-dim);
      border-color: var(--accent-dim);
    }
    .msg.assistant .msg-avatar {
      font-family: var(--font-display);
      color: var(--accent);
      font-style: italic;
      font-size: 15px;
    }

    .msg-body { max-width: 76%; }

    .msg-bubble {
      padding: 10px 14px;
      font-size: 13.5px;
      line-height: 1.55;
      border-radius: 10px;
    }
    .msg.user .msg-bubble {
      background: var(--accent);
      color: var(--bg);
      font-weight: 500;
      border-radius: 10px 3px 10px 10px;
    }
    .msg.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 3px 10px 10px 10px;
    }

    .msg-timestamp {
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
      letter-spacing: 0.02em;
    }
    .msg.user .msg-timestamp { text-align: right; }

    @keyframes flash {
      0%   { background: var(--accent-dim); }
      100% { background: transparent; }
    }
    .msg.is-new .msg-bubble { animation: flash 0.9s ease-out; }

    /* CONTEXT PANEL ────────────────────────────────────────────── */
    .context-panel {
      overflow-y: auto;
      padding: 24px 26px 32px;
      background: var(--bg2);
    }

    .ctx-block { margin-bottom: 30px; }
    .ctx-block:last-child { margin-bottom: 0; }

    .ctx-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 9px;
      border-bottom: 1px solid var(--border);
    }
    .ctx-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .ctx-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .pedido-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 13px 14px 14px;
      margin-bottom: 10px;
      position: relative;
    }
    .pedido-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      opacity: 0.55;
    }
    .pedido-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .pedido-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .pedido-total {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }
    .pedido-items {
      font-size: 12.5px;
      color: var(--text-dim);
      line-height: 1.7;
    }
    .item-qty { color: var(--muted); font-family: var(--font-mono); margin-right: 6px; }
    .item-name { color: var(--text); }
    .item-note { color: var(--muted); font-style: italic; font-size: 11.5px; }

    .metadata-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px dashed var(--border);
      gap: 12px;
    }
    .metadata-row:last-child { border-bottom: 0; }
    .metadata-row .label {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    .metadata-row .value {
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11.5px;
      text-align: right;
      word-break: break-all;
    }
    .metadata-row .value.clickable { cursor: pointer; transition: color 0.15s; }
    .metadata-row .value.clickable:hover { color: var(--accent); }

    .ctx-empty {
      font-size: 12.5px;
      color: var(--muted);
      font-style: italic;
      padding: 8px 0;
      font-family: var(--font-display);
    }

    /* SCROLLBAR ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

    /* TOAST for errors / disconnected */
    .toast {
      position: fixed;
      top: 72px;
      right: 24px;
      background: rgba(10,10,12,0.96);
      border: 1px solid var(--alert);
      border-left-width: 3px;
      padding: 10px 14px;
      font-size: 11.5px;
      font-family: var(--font-mono);
      color: var(--alert);
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateX(20px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.visible { opacity: 1; transform: translateX(0); }

    /* MOBILE ───────────────────────────────────────────────────── */
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      aside { display: block; }
      main { display: none; }
      .app.detail-open aside { display: none; }
      .app.detail-open main { display: flex; }
      .main-content { grid-template-columns: 1fr; }
      .context-panel { border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <div class="brand">
        <div class="brand-logo">Clave<em>AI</em></div>
        <div class="brand-context">Panel · Monitoreo</div>
      </div>
      <div class="header-right">
        <div class="live-indicator"><span class="dot"></span>Live</div>
        <div class="user-email" id="userEmail">—</div>
        <button class="logout-btn" id="logoutBtn">Salir</button>
      </div>
    </header>

    <aside>
      <div class="sidebar-section">
        <div class="sidebar-label">Filtrar por demo</div>
        <div class="filter-chips" id="filterChips"></div>
      </div>
      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="section-header">
          <div class="section-title live">Activas</div>
          <div class="section-count" id="activeCount">00</div>
        </div>
        <div class="session-list" id="activeList"></div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section">
        <div class="section-header">
          <div class="section-title">Históricas</div>
          <div class="section-count" id="historicCount">00</div>
        </div>
        <div class="session-list" id="historicList"></div>
      </div>
    </aside>

    <main id="mainArea">
      <div class="empty-state" id="emptyState">
        <div class="asterisk">✦</div>
        <div class="big">Selecciona una<br>conversación</div>
        <div class="small">Las sesiones de todas las demos aparecen a la izquierda en tiempo real. Elige una para ver el chat y el contexto del cliente.</div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase.js"></script>
  <script>
    // ════════════════════════════════════════════════════════════
    // CONFIG
    // ════════════════════════════════════════════════════════════
    const DEMO_META = {
      restaurante:  { emoji: '🍽️', name: 'Restaurante' },
      clinica:      { emoji: '🏥', name: 'Clínica' },
      gimnasio:     { emoji: '💪', name: 'Gimnasio' },
      hotel:        { emoji: '🏨', name: 'Hotel' },
      inmobiliaria: { emoji: '🏢', name: 'Inmobiliaria' },
      salon:        { emoji: '✂️', name: 'Salón' },
      taller:       { emoji: '🔧', name: 'Taller' },
      ventas:       { emoji: '💼', name: 'Ventas' },
    };
    const ACTIVE_THRESHOLD_MS = 15 * 60 * 1000;

    // ════════════════════════════════════════════════════════════
    // STATE
    // ════════════════════════════════════════════════════════════
    const sessions = new Map();   // sesion_id → { sesion_id, demo, msgs, firstTime, lastTime }
    let currentFilter = 'all';
    let openedId = null;
    const unread = new Set();

    // ════════════════════════════════════════════════════════════
    // BOOT
    // ════════════════════════════════════════════════════════════
    async function init() {
      const { data: { session } } = await db.auth.getSession();
      if (!session) { window.location.href = '/admin/login.html'; return; }

      document.getElementById('userEmail').textContent = session.user.email;
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await db.auth.signOut();
        window.location.href = '/admin/login.html';
      });

      renderFilterChips();
      await loadSessions();
      subscribeRealtime();

      setInterval(render, 30000);          // refresh relative times + segmentation
    }

    // ════════════════════════════════════════════════════════════
    // LOAD
    // ════════════════════════════════════════════════════════════
    async function loadSessions() {
      const { data, error } = await db
        .from('conversaciones')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(500);

      if (error) { showToast(error.message); return; }

      sessions.clear();
      for (const row of [...data].reverse()) {
        let s = sessions.get(row.sesion_id);
        if (!s) {
          s = {
            sesion_id: row.sesion_id,
            demo: row.demo,
            msgs: [],
            firstTime: row.created_at,
            lastTime: row.created_at,
          };
          sessions.set(row.sesion_id, s);
        }
        s.msgs.push(row);
        s.lastTime = row.created_at;
      }
      render();
    }

    // ════════════════════════════════════════════════════════════
    // REALTIME
    // ════════════════════════════════════════════════════════════
    function subscribeRealtime() {
      db.channel('admin-conv')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'conversaciones' }, (p) => {
          handleNewMessage(p.new);
        })
        .subscribe();

      db.channel('admin-pedidos')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'pedidos' }, (p) => {
          if (p.new.sesion_id === openedId) loadContextPanel(openedId);
        })
        .subscribe();

      db.channel('admin-rsv')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reservaciones' }, (p) => {
          if (p.new.sesion_id === openedId) loadContextPanel(openedId);
        })
        .subscribe();
    }

    function handleNewMessage(row) {
      let s = sessions.get(row.sesion_id);
      if (!s) {
        s = {
          sesion_id: row.sesion_id,
          demo: row.demo,
          msgs: [row],
          firstTime: row.created_at,
          lastTime: row.created_at,
        };
        sessions.set(row.sesion_id, s);
      } else {
        s.msgs.push(row);
        s.lastTime = row.created_at;
      }

      if (row.sesion_id === openedId) {
        appendMessage(row, true);
      } else {
        unread.add(row.sesion_id);
      }
      render();
    }

    // ════════════════════════════════════════════════════════════
    // RENDER — sidebar
    // ════════════════════════════════════════════════════════════
    function renderFilterChips() {
      const el = document.getElementById('filterChips');
      const chips = [
        { id: 'all', label: 'Todos' },
        ...Object.entries(DEMO_META).map(([k, v]) => ({ id: k, label: v.emoji + ' ' + v.name })),
      ];
      el.innerHTML = chips.map(c =>
        `<button class="chip ${c.id === currentFilter ? 'active' : ''}" data-filter="${c.id}">${c.label}</button>`
      ).join('');
      el.querySelectorAll('.chip').forEach(b =>
        b.addEventListener('click', () => {
          currentFilter = b.dataset.filter;
          renderFilterChips();
          render();
        })
      );
    }

    function render() {
      const now = Date.now();
      const all = Array.from(sessions.values())
        .filter(s => currentFilter === 'all' || s.demo === currentFilter)
        .sort((a, b) => new Date(b.lastTime) - new Date(a.lastTime));

      const active = all.filter(s => now - new Date(s.lastTime).getTime() < ACTIVE_THRESHOLD_MS);
      const historic = all.filter(s => now - new Date(s.lastTime).getTime() >= ACTIVE_THRESHOLD_MS);

      renderList('activeList', active, true);
      renderList('historicList', historic, false);
      document.getElementById('activeCount').textContent = String(active.length).padStart(2, '0');
      document.getElementById('historicCount').textContent = String(historic.length).padStart(2, '0');
    }

    function renderList(elId, list, isActive) {
      const el = document.getElementById(elId);
      if (list.length === 0) {
        el.innerHTML = `<div class="sidebar-empty">${isActive ? 'Sin sesiones activas.' : 'Sin historial aún.'}</div>`;
        return;
      }
      const now = Date.now();
      el.innerHTML = list.map(s => {
        const meta = DEMO_META[s.demo] || { emoji: '●', name: s.demo };
        const lastMsg = s.msgs[s.msgs.length - 1] || {};
        const preview = escapeHtml((lastMsg.mensaje || '').slice(0, 100));
        const timeAgo = formatRelative(s.lastTime);
        const isFresh = now - new Date(s.lastTime).getTime() < 60000;
        const isSelected = s.sesion_id === openedId;
        const hasUnread = unread.has(s.sesion_id) && !isSelected;
        return `
          <div class="session-card ${isSelected ? 'selected' : ''}" data-id="${s.sesion_id}">
            <div class="session-top">
              <div class="session-demo">${meta.emoji} ${meta.name}</div>
              <div class="session-time ${isFresh ? 'fresh' : ''}">${timeAgo}</div>
            </div>
            <div class="session-preview">${preview}</div>
            ${hasUnread ? '<div class="unread-dot"></div>' : ''}
          </div>
        `;
      }).join('');
      el.querySelectorAll('.session-card').forEach(c =>
        c.addEventListener('click', () => openSession(c.dataset.id))
      );
    }

    // ════════════════════════════════════════════════════════════
    // RENDER — detail
    // ════════════════════════════════════════════════════════════
    async function openSession(id) {
      openedId = id;
      unread.delete(id);
      const s = sessions.get(id);
      if (!s) return;

      document.getElementById('app').classList.add('detail-open');

      const meta = DEMO_META[s.demo] || { emoji: '●', name: s.demo };
      const now = Date.now();
      const isActive = now - new Date(s.lastTime).getTime() < ACTIVE_THRESHOLD_MS;
      const shortId = s.sesion_id.slice(0, 8);
      const firstTime = formatAbsolute(s.firstTime);

      const mainEl = document.getElementById('mainArea');
      mainEl.innerHTML = `
        <div class="session-header">
          <div class="sh-left">
            <div class="sh-title"><span class="emoji">${meta.emoji}</span>${meta.name}</div>
            <div class="sh-meta">
              <span class="status ${isActive ? 'active' : 'historic'}">${isActive ? '● En vivo' : '○ Histórica'}</span>
              <span>${shortId}…</span>
              <span>inició ${firstTime}</span>
            </div>
          </div>
        </div>
        <div class="main-content">
          <div class="chat-view" id="chatView"></div>
          <div class="context-panel" id="contextPanel"></div>
        </div>
      `;

      const chatView = document.getElementById('chatView');
      chatView.innerHTML = s.msgs.map(m => renderMessage(m, false)).join('');
      chatView.scrollTop = chatView.scrollHeight;

      await loadContextPanel(id);
      render();
    }

    function renderMessage(m, isNew) {
      const isUser = m.rol === 'user';
      const time = new Date(m.created_at).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
      const avatar = isUser ? '👤' : '✦';
      const safe = escapeHtml(m.mensaje || '').replace(/\n/g, '<br>');
      const roleClass = isUser ? 'user' : 'assistant';
      return `
        <div class="msg ${roleClass} ${isNew ? 'is-new' : ''}">
          <div class="msg-avatar">${avatar}</div>
          <div class="msg-body">
            <div class="msg-bubble">${safe}</div>
            <div class="msg-timestamp">${time}</div>
          </div>
        </div>
      `;
    }

    function appendMessage(m, isNew) {
      const chatView = document.getElementById('chatView');
      if (!chatView) return;
      chatView.insertAdjacentHTML('beforeend', renderMessage(m, isNew));
      chatView.scrollTop = chatView.scrollHeight;
    }

    async function loadContextPanel(id) {
      const panel = document.getElementById('contextPanel');
      if (!panel) return;
      const s = sessions.get(id);
      if (!s) return;

      let html = '';

      if (s.demo === 'restaurante') {
        const { data: pedidos } = await db
          .from('pedidos').select('*, pedido_items(*)')
          .eq('sesion_id', id).order('created_at');

        html += `
          <div class="ctx-block">
            <div class="ctx-header">
              <div class="ctx-title">Pedidos</div>
              <div class="ctx-count">${(pedidos || []).length.toString().padStart(2,'0')}</div>
            </div>
            ${(pedidos && pedidos.length) ? pedidos.map(renderPedido).join('')
              : '<div class="ctx-empty">Sin pedidos confirmados en esta sesión.</div>'}
          </div>
        `;

        const { data: rsv } = await db
          .from('reservaciones').select('*')
          .eq('sesion_id', id).order('created_at');

        html += `
          <div class="ctx-block">
            <div class="ctx-header">
              <div class="ctx-title">Reservaciones</div>
              <div class="ctx-count">${(rsv || []).length.toString().padStart(2,'0')}</div>
            </div>
            ${(rsv && rsv.length) ? rsv.map(renderReservacion).join('')
              : '<div class="ctx-empty">Sin reservaciones.</div>'}
          </div>
        `;
      }

      const durMs = new Date(s.lastTime) - new Date(s.firstTime);
      html += `
        <div class="ctx-block">
          <div class="ctx-header">
            <div class="ctx-title">Metadatos</div>
          </div>
          <div class="metadata-row"><span class="label">Mensajes</span><span class="value">${s.msgs.length.toString().padStart(2,'0')}</span></div>
          <div class="metadata-row"><span class="label">Duración</span><span class="value">${formatDuration(durMs)}</span></div>
          <div class="metadata-row"><span class="label">Inicio</span><span class="value">${formatAbsolute(s.firstTime)}</span></div>
          <div class="metadata-row"><span class="label">Último</span><span class="value">${formatAbsolute(s.lastTime)}</span></div>
          <div class="metadata-row">
            <span class="label">Sesión ID</span>
            <span class="value clickable" data-sid="${s.sesion_id}" title="Click para copiar">${s.sesion_id.slice(0, 12)}…</span>
          </div>
        </div>
      `;

      panel.innerHTML = html;
      panel.querySelectorAll('.value.clickable').forEach(el => {
        el.addEventListener('click', () => {
          navigator.clipboard?.writeText(el.dataset.sid);
          const prev = el.textContent;
          el.textContent = 'copiado';
          setTimeout(() => { el.textContent = prev; }, 900);
        });
      });
    }

    function renderPedido(p) {
      const items = (p.pedido_items || []).map(i => `
        <div>
          <span class="item-qty">${i.cantidad}×</span>
          <span class="item-name">${escapeHtml(i.nombre)}</span>
          ${i.notas ? `<span class="item-note"> — ${escapeHtml(i.notas)}</span>` : ''}
        </div>
      `).join('');
      return `
        <div class="pedido-card">
          <div class="pedido-head">
            <div class="pedido-num">#${escapeHtml(p.numero || '')} · ${escapeHtml(p.tipo || '')}</div>
            <div class="pedido-total">$${Number(p.total || 0).toFixed(0)}</div>
          </div>
          <div class="pedido-items">${items}</div>
        </div>
      `;
    }

    function renderReservacion(r) {
      return `
        <div class="pedido-card">
          <div class="pedido-head">
            <div class="pedido-num">${escapeHtml(r.folio || '')}</div>
            <div class="pedido-total">${r.personas || '?'} pers.</div>
          </div>
          <div class="pedido-items">
            ${escapeHtml(r.fecha || '')} · ${escapeHtml(r.hora || '')}
            ${r.ocasion ? ` · <span class="item-note">${escapeHtml(r.ocasion)}</span>` : ''}
          </div>
        </div>
      `;
    }

    // ════════════════════════════════════════════════════════════
    // HELPERS
    // ════════════════════════════════════════════════════════════
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function formatRelative(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const s = Math.floor(diff / 1000);
      if (s < 45) return 'ahora';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h';
      const d = Math.floor(h / 24);
      return d + 'd';
    }

    function formatAbsolute(iso) {
      const d = new Date(iso);
      return d.toLocaleString('es-MX', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function formatDuration(ms) {
      const s = Math.floor(ms / 1000);
      if (s < 60) return s + 's';
      const m = Math.floor(s / 60);
      const sec = s % 60;
      if (m < 60) return m + 'm ' + sec + 's';
      const h = Math.floor(m / 60);
      return h + 'h ' + (m % 60) + 'm';
    }

    function showToast(text) {
      const el = document.getElementById('toast');
      el.textContent = text;
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 4000);
    }

    init();
  </script>
</body>
</html>
