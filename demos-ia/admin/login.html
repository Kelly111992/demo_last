<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClaveAI · Panel · Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --text: #ecebe6;
      --text-dim: #8a8a91;
      --muted: #56565c;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.16);
      --accent: #d7ff3e;
      --accent-dim: rgba(215,255,62,0.15);
      --alert: #ff6b6b;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        radial-gradient(rgba(255,255,255,0.008) 1px, transparent 1px);
      background-size: 4px 4px, 7px 7px;
      background-position: 0 0, 2px 2px;
    }

    .stage {
      width: 100%;
      max-width: 440px;
      position: relative;
    }

    .diagonal {
      position: absolute;
      top: -60px;
      left: -20px;
      right: -20px;
      height: 1px;
      background: var(--border);
      transform: rotate(-3deg);
      transform-origin: center;
    }

    .frame {
      padding: 52px 44px 44px;
      border: 1px solid var(--border);
      position: relative;
      background: rgba(0,0,0,0.35);
      animation: appear 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes appear {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .frame::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 2px;
      background: var(--accent);
    }
    .frame::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 14px; height: 14px;
      border-right: 1px solid var(--border-strong);
      border-bottom: 1px solid var(--border-strong);
    }

    .eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.24em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .eyebrow::before {
      content: '';
      width: 22px;
      height: 1px;
      background: var(--accent);
    }

    .brand {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 38px;
      font-weight: 400;
      letter-spacing: -0.025em;
      line-height: 1;
      margin-bottom: 8px;
    }
    .brand span { color: var(--accent); font-style: normal; font-weight: 600; font-family: var(--font-body); font-size: 30px; vertical-align: 0.04em; letter-spacing: -0.04em; }

    .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 40px;
      line-height: 1.5;
    }

    form { display: flex; flex-direction: column; }

    .form-row { margin-bottom: 24px; }

    .form-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 9.5px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .form-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-strong);
      color: var(--text);
      padding: 8px 0;
      font-family: var(--font-body);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-bottom-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }

    .btn {
      margin-top: 18px;
      padding: 14px 20px;
      background: var(--accent);
      color: #0a0a0c;
      border: none;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .btn::after {
      content: '→';
      font-family: var(--font-mono);
      font-size: 14px;
      transition: transform 0.2s;
    }
    .btn:hover:not(:disabled) { filter: brightness(1.08); }
    .btn:hover:not(:disabled)::after { transform: translateX(4px); }
    .btn:disabled { opacity: 0.5; cursor: wait; }

    .error {
      margin-top: 18px;
      padding: 11px 14px;
      border-left: 2px solid var(--alert);
      background: rgba(255,107,107,0.05);
      color: var(--alert);
      font-size: 12px;
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
      display: none;
      animation: shake 0.4s;
    }
    @keyframes shake {
      10%, 90% { transform: translateX(-1px); }
      20%, 80% { transform: translateX(2px); }
      30%, 50%, 70% { transform: translateX(-3px); }
      40%, 60% { transform: translateX(3px); }
    }
    .error.visible { display: block; }

    .foot {
      margin-top: 44px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }
    .foot a { color: var(--text-dim); text-decoration: none; transition: color 0.15s; }
    .foot a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="stage">
    <div class="diagonal"></div>
    <div class="frame">
      <div class="eyebrow">Panel · Acceso</div>
      <div class="brand">Clave<span>AI</span></div>
      <div class="subtitle">Centro de monitoreo de conversaciones en vivo.</div>

      <form id="loginForm" autocomplete="on">
        <div class="form-row">
          <label class="form-label" for="email">Correo</label>
          <input id="email" class="form-input" type="email" required autocomplete="username" placeholder="admin@clave.ai" />
        </div>
        <div class="form-row">
          <label class="form-label" for="password">Contraseña</label>
          <input id="password" class="form-input" type="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn" id="submitBtn">Entrar</button>
        <div class="error" id="error"></div>
      </form>

      <div class="foot">
        <span>v1.0 · secure</span>
        <a href="/">← volver</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/supabase.js"></script>
  <script>
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) window.location.href = '/admin/';
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('error');
      errEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Verificando…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.textContent = 'Credenciales inválidas. Intenta de nuevo.';
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Entrar';
        return;
      }
      window.location.href = '/admin/';
    });
  </script>
</body>
</html>
